<div class="auth-page">
  <div class="auth-card">
    <h2>Crear Cuenta</h2>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <div class="form">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" [(ngModel)]="fullName" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" [(ngModel)]="confirmPassword" placeholder="••••••••" />
      </div>
      <button (click)="onSubmit()" [disabled]="loading()" class="btn-submit">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
    </div>

    <p class="switch">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
